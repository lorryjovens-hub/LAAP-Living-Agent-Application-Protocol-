name: LAAP CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check laap/ tests/ 2>&1 | head -200
      - name: Type check with mypy
        run: mypy laap/ --ignore-missing-imports 2>&1 | head -200
        continue-on-error: true

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test with pytest
        run: python -m pytest tests/ -v --tb=short --cov=laap --cov-report=term-missing --cov-report=xml -p no:cacheprovider
      - name: Upload coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bandit
        run: pip install bandit[sarif]
      - name: Run Bandit security scan
        run: bandit -r laap/ -ll -f sarif -o bandit-results.sarif
        continue-on-error: true
      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build check-wheel-contents
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify wheel
        run: |
          check-wheel-contents dist/*.whl
          python -c "import zipfile,glob; z=zipfile.ZipFile(glob.glob('dist/laap-*-py3-none-any.whl')[0]); print('Packages:', [n for n in z.namelist() if n.endswith('__init__.py')][:5])"
      - name: Install from wheel & smoke test
        run: |
          pip install dist/*.whl
          laap --version