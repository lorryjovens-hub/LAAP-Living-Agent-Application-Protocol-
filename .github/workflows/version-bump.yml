name: Version Bump & Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (preview only)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bump version
        id: bump
        run: |
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          IFS='.' read -r MAJ MIN PAT <<< "${CURRENT}"
          case "${{ inputs.bump }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="${MAJ}.${MIN}.${PAT}"
          echo "Current: ${CURRENT}  ->  New: ${NEW}"
          echo "new_version=${NEW}" >> $GITHUB_OUTPUT
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            sed -i "s/version = \"${CURRENT}\"/version = \"${NEW}\"/" pyproject.toml
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW}\"/" npm/laap-ai/package.json 2>/dev/null || true
          fi
      - name: Commit & Push
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml npm/laap-ai/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags