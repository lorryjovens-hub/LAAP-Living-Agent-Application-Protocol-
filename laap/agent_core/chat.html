<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAAP Stream Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #212121; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #171717; padding: 14px 24px; border-bottom: 1px solid #333;
            display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 18px; font-weight: 600; color: #10a37f; }
  #header .badge { font-size: 11px; background: #2a2a2a; color: #888; padding: 2px 10px;
                   border-radius: 12px; }
  #header .status { margin-left: auto; display: flex; align-items: center; gap: 6px;
                    font-size: 13px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.online { background: #10a37f; }
  .dot.offline { background: #555; }
  .dot.thinking { background: #facc15; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat { flex: 1; overflow-y: auto; padding: 20px 16px; scroll-behavior: smooth; }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  .msg { max-width: 85%; margin-bottom: 20px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { margin-left: auto; }
  .msg.assistant { margin-right: auto; }
  .msg .label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #888; }
  .msg.user .label { text-align: right; color: #10a37f; }
  .msg .bubble { padding: 12px 16px; border-radius: 14px; line-height: 1.6; font-size: 14px;
                 white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: #10a37f; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #2f2f2f; color: #e0e0e0; border-bottom-left-radius: 4px;
                           border: 1px solid #3a3a3a; }
  .msg .cursor { display: inline-block; width: 2px; height: 1em; background: #10a37f;
                 margin-left: 2px; animation: blink 0.8s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
  .msg.system .bubble { background: #1a1a2e; color: #888; border: 1px dashed #333;
                         font-size: 13px; text-align: center; border-radius: 8px; }
  #input-area { padding: 16px 20px 20px; background: #171717; border-top: 1px solid #333; }
  #input-wrap { display: flex; gap: 10px; align-items: flex-end; }
  #input { flex: 1; background: #2f2f2f; border: 1px solid #3a3a3a; border-radius: 12px;
           padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; resize: none;
           min-height: 48px; max-height: 120px; font-family: inherit; }
  #input:focus { border-color: #10a37f; }
  #input::placeholder { color: #666; }
  #send { background: #10a37f; border: none; border-radius: 12px; width: 48px; height: 48px;
          cursor: pointer; display: flex; align-items: center; justify-content: center;
          flex-shrink: 0; transition: background 0.2s; }
  #send:hover { background: #0e8c6b; }
  #send:disabled { background: #2a4a3f; cursor: not-allowed; }
  #send svg { width: 20px; height: 20px; fill: #fff; }
  #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center;
                 height: 100%; color: #555; padding: 40px; }
  #empty-state svg { width: 64px; height: 64px; fill: #333; margin-bottom: 16px; }
  #empty-state h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; color: #444; }
  #empty-state p { font-size: 14px; text-align: center; max-width: 360px; line-height: 1.5; }
  .error-msg { color: #ef4444; }
</style>
</head>
<body>
<div id="header">
  <h1>LAAP Stream</h1>
  <span class="badge">SSE Stream</span>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Ready</span>
  </div>
</div>
<div id="chat">
  <div id="empty-state">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
    <h2>开始对话</h2>
    <p>输入消息后按回车或点击发送，LAAP 智能体会流式回复</p>
  </div>
</div>
<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
    <button id="send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const emptyState = document.getElementById('empty-state');

let eventSource = null;
let currentBubble = null;
let currentMsgDiv = null;

function setStatus(state, text) {
  statusDot.className = 'dot ' + state;
  statusText.textContent = text;
}

function addMessage(role, content) {
  emptyState.style.display = 'none';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? '你' : 'LAAP';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  msgDiv.appendChild(label);
  msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;
  return { div: msgDiv, bubble };
}

function startStreamMessage() {
  emptyState.style.display = 'none';
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'LAAP';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);
  msgDiv.appendChild(label);
  msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;
  return { div: msgDiv, bubble, cursor };
}

function appendToken(token) {
  if (!currentBubble) {
    const el = startStreamMessage();
    currentMsgDiv = el.div;
    currentBubble = el.bubble;
  }
  // Insert text before the cursor
  const cursor = currentBubble.querySelector('.cursor');
  const textNode = document.createTextNode(token);
  if (cursor) {
    currentBubble.insertBefore(textNode, cursor);
  } else {
    currentBubble.appendChild(document.createTextNode(token));
  }
  chat.scrollTop = chat.scrollHeight;
}

function finishMessage(fullContent) {
  if (currentBubble) {
    // Remove cursor
    const cursor = currentBubble.querySelector('.cursor');
    if (cursor) cursor.remove();
    // Make sure full content is set
    currentBubble.textContent = fullContent;
    currentBubble.scrollTop = currentBubble.scrollHeight;
  }
  currentBubble = null;
  currentMsgDiv = null;
}

function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  if (eventSource) {
    eventSource.close();
    eventSource = null;
    finishMessage(currentBubble ? currentBubble.textContent : '');
  }
  addMessage('user', msg);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  setStatus('thinking', '思考中...');
  eventSource = new EventSource('/stream?msg=' + encodeURIComponent(msg));
  currentBubble = null;
  currentMsgDiv = null;
  let fullContent = '';
  eventSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.token) {
        fullContent += data.token;
        appendToken(data.token);
      } else if (data.done) {
        fullContent = data.content;
        finishMessage(data.content);
        setStatus('online', '在线');
        sendBtn.disabled = false;
        eventSource.close();
        eventSource = null;
      } else if (data.error) {
        finishMessage('错误: ' + data.error);
        setStatus('offline', '错误');
        sendBtn.disabled = false;
        eventSource.close();
        eventSource = null;
      }
    } catch(e) {
      console.warn('Parse error:', e);
    }
  };
  eventSource.onerror = function() {
    if (fullContent) {
      finishMessage(fullContent);
    } else {
      addMessage('system', '连接断开，请重试。');
    }
    setStatus('offline', '离线');
    sendBtn.disabled = false;
    eventSource.close();
    eventSource = null;
  };
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  sendBtn.disabled = !this.value.trim();
});

setStatus('online', '在线');
</script>
</body>
</html>
